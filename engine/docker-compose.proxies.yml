# Tree Frog Streams — Optional proxy stack (DistroTV + Samsung)
#
# Two free, ad-supported IPTV source proxies that sit alongside
# tf-engine to add ~550 channels. They publish M3U+XMLTV endpoints
# the engine imports the same way it imports any other playlist.
#
# Six additional sources (Pluto US/CA, Local Now, Plex US/CA,
# Xumo) are imported as remote M3Us — no container, no port, no
# CPU. See docs/proxy-stack.md §3 for the import commands.
#
# Architecture:
#   ┌─────────────────┐   m3u+xmltv    ┌──────────┐    m3u+xmltv     ┌──────────────┐
#   │ samsung-tvplus  │ ─────────────▶ │          │ ────────────────▶│   Worker     │
#   │ distrotv-proxy  │                │ tf-engine│   KV catalog     │ free.tfplus. │
#   │ + 6 remote M3Us │ ─────────────▶ │ 8000     │   KV playlist    │    stream    │
#   └─────────────────┘                └──────────┘                  └──────────────┘
#
# All containers bind via `network_mode: host` because (a) they
# don't need isolation between each other and the engine, (b)
# M3U/EPG endpoints are friendlier to type as localhost:PORT than
# as docker-network IPs, and (c) the resource caps below make the
# host kernel the single place to police CPU/memory.
#
# Bring this up with:
#   cd /opt/treefrogfree
#   docker compose -f engine/docker-compose.yml        up -d        # engine
#   docker compose -f engine/docker-compose.proxies.yml up -d       # proxies
#
# See docs/proxy-stack.md for the per-proxy setup steps, the
# remote-M3U import commands, and the verification curls.
#
# ── Port allocation on the host (DO NOT change without reading this) ──
#
#   3000      — **AIOstreams** (operator's most important service).
#               RESERVED. Never bind a container here, never curl
#               127.0.0.1:3000 as a diagnostic for any proxy.
#   3001      — Samsung TV Plus (this file; pinned via PORT=3001).
#   8000      — Tree Frog engine (docker-compose.yml).
#   8787      — DistroTV Proxy (this file).
#   50005     — SSH (already running on the host; never bind here).
#
# The matthuisman samsung-tvplus image defaults to port 80. We pin
# it to 3001 via the PORT env var to keep AIOstreams (port 3000)
# untouched. (Pluto for Channels used to live on port 80 in an
# earlier revision; it was dropped because Pluto's API returns an
# empty channel list from cloud IPs — see proxy-stack.md top.)

services:
  # ──────────────────────────────────────────────────────────────────
  # 1. DistroTV Proxy (ghcr.io/kineticman/distrotv-proxy)
  #    https://github.com/kineticman/DistroTV-Proxy
  # ──────────────────────────────────────────────────────────────────
  # Start with this one — it's the simplest (no auth, no DB, no
  # admin UI) and the easiest to verify. ~150 free channels from
  # DistroTV, served from a Python BaseHTTP listener.
  #
  # M3U path:  http://<host>:8787/playlist.m3u
  # XMLTV:     none (DistroTV doesn't publish a guide)
  #
  # The image only implements `GET`, so `curl -I` returns 501. Use
  # `curl -s` (GET) instead when verifying. See proxy-stack.md §1.
  distrotv-proxy:
    image: ghcr.io/kineticman/distrotv-proxy:latest
    container_name: tf-distrotv-proxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/distrotv-proxy:/config
    cpus: 0.10                # tiny — pure pass-through
    mem_limit: 128m
    mem_reservation: 64m
    pids_limit: 100

  # ──────────────────────────────────────────────────────────────────
  # 2. Samsung TV Plus for Channels (matthuisman/samsung-tvplus-for-channels)
  #    https://github.com/matthuisman/samsung-tvplus-for-channels
  # ──────────────────────────────────────────────────────────────────
  # ~400 ad-supported "Samsung TV Plus" channels.
  #
  # The image's URL shape is NOT the channels-dvr `/tuner-N-playlist.m3u`
  # convention — the M3U is at `/playlist.m3u8` (note the .m3u8
  # extension) and the EPG is at `/epg.xml`. The query param
  # `?regions=us` filters the channel list; pinning REGIONS=us in
  # the env so the upstream API doesn't return geo-restricted
  # channels that won't play outside their home region.
  #
  # The matthuisman image defaults to port 80. We pin it to 3001
  # via the PORT env var to keep AIOstreams (port 3000) untouched.
  #
  # M3U path:  http://<host>:3001/playlist.m3u8?regions=us
  # XMLTV:     http://<host>:3001/epg.xml
  samsung-tvplus:
    image: matthuisman/samsung-tvplus-for-channels:latest
    container_name: tf-samsung-tvplus
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/samsung-tvplus:/config
    cpus: 0.25
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 100
    environment:
      # Pin to 3001 — see comment block at top of file.
      - PORT=3001
      # Limit to US channels. The upstream supports a | separated
      # list (us|ca) but we don't know which Canadian channels the
      # engine's player will actually be able to play without a
      # Canadian egress IP. Start with us, expand later if you want.
      - REGIONS=us
