# Tree Frog Streams — Optional proxy stack (Samsung + Pluto + DistroTV + Cabernet)
#
# These four containers are *not* required for the engine to work —
# they're a one-shot path to ~500 additional "free" channels sourced
# from Samsung TV Plus, Pluto TV, DistroTV, and (via Cabernet) Xumo /
# Plex / custom M3U/XMLTV feeds. They run alongside tf-engine and
# publish M3U+XMLTV endpoints that the engine imports the same way it
# imports any other playlist.
#
# Architecture:
#   ┌─────────────────┐   m3u+xmltv    ┌──────────┐    m3u+xmltv     ┌──────────────┐
#   │ samsung-tvplus  │ ─────────────▶ │          │ ────────────────▶│   Worker     │
#   │ pluto-for-chans │                │ tf-engine│   KV catalog     │ free.tfplus. │
#   │ distrotv-proxy  │                │ 8000     │   KV playlist    │    stream    │
#   │ cabernet        │ ─────────────▶ │          │                  └──────────────┘
#   └─────────────────┘                └──────────┘
#
# All four bind via `network_mode: host` because (a) they don't need
# isolation between each other and the engine, (b) M3U/EPG endpoints
# are friendlier to type as localhost:PORT than as docker-network IPs,
# and (c) the resource caps below make the host kernel the
# single place to police CPU/memory.
#
# Bring this up with:
#   cd /opt/treefrogfree
#   docker compose -f engine/docker-compose.yml        up -d        # engine
#   docker compose -f engine/docker-compose.proxies.yml up -d       # proxies
#
# See docs/proxy-stack.md for the per-proxy setup steps, auth
# requirements, and the import commands.

services:
  # ──────────────────────────────────────────────────────────────────
  # 1. DistroTV Proxy (ghcr.io/kineticman/distrotv-proxy)
  #    https://github.com/kineticman/DistroTV-Proxy
  # ──────────────────────────────────────────────────────────────────
  # Start with this one — it's the simplest (no auth, no DB, no
  # admin UI) and the easiest to verify. ~150 free channels from
  # DistroTV, served from a Python BaseHTTP listener.
  #
  # M3U path:  http://<host>:8787/playlist.m3u
  # XMLTV:     none (DistroTV doesn't publish a guide)
  #
  # The image only implements `GET`, so `curl -I` returns 501. Use
  # `curl -s` (GET) instead when verifying. See proxy-stack.md §1.
  distrotv-proxy:
    image: ghcr.io/kineticman/distrotv-proxy:latest
    container_name: tf-distrotv-proxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/distrotv-proxy:/config
    cpus: 0.10                # tiny — pure pass-through
    mem_limit: 128m
    mem_reservation: 64m
    pids_limit: 100

  # ──────────────────────────────────────────────────────────────────
  # 2. Samsung TV Plus for Channels (matthuisman/samsung-tvplus-for-channels)
  #    https://github.com/matthuisman/samsung-tvplus-for-channels
  # ──────────────────────────────────────────────────────────────────
  # ~400 ad-supported "Samsung TV Plus" channels. Channels DVR–compat
  # backend, so the URL shape is `/tuner-N-playlist.m3u` + `/epg.xml`.
  #
  # The image binds a non-default port — DON'T assume 80. Probe with
  # `curl -s http://<host>:<PORT>/` and look for the index page that
  # lists "tuner-1-playlist.m3u" through "tuner-12-playlist.m3u".
  # (On the operator's host Samsung ended up on port 3000.) See
  # proxy-stack.md §2.
  samsung-tvplus:
    image: matthuisman/samsung-tvplus-for-channels:latest
    container_name: tf-samsung-tvplus
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/samsung-tvplus:/config
    cpus: 0.25
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 100

  # ──────────────────────────────────────────────────────────────────
  # 3. Pluto for Channels (jonmaddox/pluto-for-channels)
  #    https://github.com/jonmaddox/pluto-for-channels
  # ──────────────────────────────────────────────────────────────────
  # ~250 free, ad-supported channels. Like Samsung, it's a matthuisman
  # Channels DVR server (nginx + uvicorn), so the URL shape is
  # `/tuner-1-playlist.m3u` + `/epg.xml` on port 80. **It will not
  # serve any M3U until PLUTO_USERNAME + PLUTO_PASSWORD are
  # configured** — the image errors out at startup without them. See
  # proxy-stack.md §3 for the creds setup.
  #
  # The `${VAR}_FILE` env pattern below matches how the main
  # engine compose reads CF_API_TOKEN_FILE / ADMIN_TOKEN_FILE. Put
  # the real values in /root/.secrets/pluto_user and pluto_password
  # (chmod 600); do NOT inline them in this file.
  pluto-for-channels:
    image: jonmaddox/pluto-for-channels:latest
    container_name: tf-pluto-for-channels
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/pluto-for-channels:/config
      # Same _FILE pattern as docker-compose.yml: the host's secrets
      # dir is bind-mounted read-only into the container, and the
      # *FILE env vars point at the in-container paths. The values
      # are loaded from /root/.secrets/{pluto_user,pluto_password}.
      - /root/.secrets:/secrets:ro
    cpus: 0.25
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 100
    environment:
      # Channels DVR emulation mode. The upstream image already
      # defaults to this when run standalone, but pinning it makes
      # the intent obvious.
      - MODE=docker
      # REQUIRED: a free Pluto account (any email, no card needed)
      # at https://pluto.tv/. Drop the creds in token files on the
      # host (chmod 600), not inline here.
      - PLUTO_USERNAME_FILE=/secrets/pluto_user
      - PLUTO_PASSWORD_FILE=/secrets/pluto_password

  # ──────────────────────────────────────────────────────────────────
  # 4. Cabernet (ghcr.io/cabernetwork/cabernet)
  #    https://github.com/cabernetwork/cabernet
  # ──────────────────────────────────────────────────────────────────
  # The "all-in-one master". Plugin-based bridge that turns free
  # linear-stream sources (Pluto, Xumo, Plex, Stirr, Local Now, …)
  # plus custom M3U/XMLTV feeds into a single Channels DVR–
  # compatible HTTP endpoint. The reason to add it on top of the
  # per-source proxies is the **plugin ecosystem**: it normalizes
  # 30+ sources and dedupes by channel name + region.
  #
  # Cab's admin UI at http://<host>:6077/ must be opened in a
  # browser once on first boot to set the admin password and pick
  # which plugins to enable. Until that's done, /m3u/channels.m3u
  # returns an 8-byte stub. See proxy-stack.md §4.
  #
  # Cab needs more memory than the other three — the plugin
  # loaders cache EPG XMLTV and channel lists in process.
  cabernet:
    image: ghcr.io/cabernetwork/cabernet:latest
    container_name: tf-cabernet
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/cabernet:/config
    cpus: 0.5
    mem_limit: 768m
    mem_reservation: 256m
    pids_limit: 200
    environment:
      # Cab's "instance name" appears in the M3U headers and shows
      # up in the admin UI. Pick a stable string here so imports
      # identify the source reliably.
      - CAB_INSTANCE_NAME=TreeFrog
