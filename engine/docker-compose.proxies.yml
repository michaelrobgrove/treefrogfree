# Tree Frog Streams — Optional proxy stack (DistroTV + Samsung + Pluto)
#
# Three free, ad-supported IPTV source proxies that sit alongside
# tf-engine to add ~600 channels. They publish M3U+XMLTV endpoints
# the engine imports the same way it imports any other playlist.
#
# Xumo is NOT a container — there's no maintained standalone
# Xumo-for-channels image. The Xumo M3U is imported directly as
# a remote URL (see docs/proxy-stack.md §5). The repo's reference
# generator lives at:
#   https://github.com/BuddyChewChew/xumo-playlist-generator
#
# Architecture:
#   ┌─────────────────┐   m3u+xmltv    ┌──────────┐    m3u+xmltv     ┌──────────────┐
#   │ samsung-tvplus  │ ─────────────▶ │          │ ────────────────▶│   Worker     │
#   │ pluto-for-chans │                │ tf-engine│   KV catalog     │ free.tfplus. │
#   │ distrotv-proxy  │ ─────────────▶ │ 8000     │   KV playlist    │    stream    │
#   └─────────────────┘                └──────────┘                  └──────────────┘
#
# All three bind via `network_mode: host` because (a) they don't
# need isolation between each other and the engine, (b) M3U/EPG
# endpoints are friendlier to type as localhost:PORT than as
# docker-network IPs, and (c) the resource caps below make the
# host kernel the single place to police CPU/memory.
#
# Bring this up with:
#   cd /opt/treefrogfree
#   docker compose -f engine/docker-compose.yml        up -d        # engine
#   docker compose -f engine/docker-compose.proxies.yml up -d       # proxies
#
# See docs/proxy-stack.md for the per-proxy setup steps, auth
# requirements, and the import commands.
#
# ── Port allocation on the host (DO NOT change without reading this) ──
#
#   80        — Pluto for Channels (this file; image default).
#   3000      — **AIOstreams** (operator's most important service).
#               RESERVED. Never bind a container here, never curl
#               127.0.0.1:3000 as a diagnostic for any proxy.
#   3001      — Samsung TV Plus (this file; pinned via PORT=3001).
#   8000      — Tree Frog engine (docker-compose.yml).
#   8787      — DistroTV Proxy (this file).
#   50005     — SSH (already running on the host; never bind here).
#
# The matthuisman channels-dvr image used by Pluto defaults to port
# 80. Samsung also defaults to 80, so we pin Samsung to 3001 via the
# PORT env var to avoid a collision (and to keep AIOstreams on 3000
# untouched).

services:
  # ──────────────────────────────────────────────────────────────────
  # 1. DistroTV Proxy (ghcr.io/kineticman/distrotv-proxy)
  #    https://github.com/kineticman/DistroTV-Proxy
  # ──────────────────────────────────────────────────────────────────
  # Start with this one — it's the simplest (no auth, no DB, no
  # admin UI) and the easiest to verify. ~150 free channels from
  # DistroTV, served from a Python BaseHTTP listener.
  #
  # M3U path:  http://<host>:8787/playlist.m3u
  # XMLTV:     none (DistroTV doesn't publish a guide)
  #
  # The image only implements `GET`, so `curl -I` returns 501. Use
  # `curl -s` (GET) instead when verifying. See proxy-stack.md §1.
  distrotv-proxy:
    image: ghcr.io/kineticman/distrotv-proxy:latest
    container_name: tf-distrotv-proxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/distrotv-proxy:/config
    cpus: 0.10                # tiny — pure pass-through
    mem_limit: 128m
    mem_reservation: 64m
    pids_limit: 100

  # ──────────────────────────────────────────────────────────────────
  # 2. Samsung TV Plus for Channels (matthuisman/samsung-tvplus-for-channels)
  #    https://github.com/matthuisman/samsung-tvplus-for-channels
  # ──────────────────────────────────────────────────────────────────
  # ~400 ad-supported "Samsung TV Plus" channels. Channels DVR–compat
  # backend, so the URL shape is `/tuner-N-playlist.m3u` + `/epg.xml`.
  # Widevine DRM streams are filtered out — only HLS reaches the
  # engine, which our player handles natively.
  #
  # The matthuisman image defaults to port 80. We pin it to 3001
  # via the PORT env var to avoid a collision with Pluto (also
  # port 80) and to keep AIOstreams (port 3000) untouched.
  #
  # M3U path:  http://<host>:3001/tuner-1-playlist.m3u
  # XMLTV:     http://<host>:3001/epg.xml
  samsung-tvplus:
    image: matthuisman/samsung-tvplus-for-channels:latest
    container_name: tf-samsung-tvplus
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/samsung-tvplus:/config
    cpus: 0.25
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 100
    environment:
      # Pin to 3001 — see comment block at top of file.
      - PORT=3001

  # ──────────────────────────────────────────────────────────────────
  # 3. Pluto for Channels (jonmaddox/pluto-for-channels)
  #    https://github.com/jonmaddox/pluto-for-channels
  # ──────────────────────────────────────────────────────────────────
  # ~250 free, ad-supported channels from Pluto TV. Matthuisman
  # channels-dvr style (nginx + uvicorn), so the URL shape is
  # `/tuner-1-playlist.m3u` + `/epg.xml` on port 80.
  #
  # **Auth quirk:** this image's `entrypoint.sh` reads
  # PLUTO_USERNAME and PLUTO_PASSWORD *directly* from the env, NOT
  # via the ${VAR}_FILE pattern used elsewhere. The image will not
  # start without those env vars set. To keep the creds out of
  # the compose file, we read them from engine/.env (chmod 600,
  # gitignored) using Compose's variable interpolation:
  #
  #   In engine/.env:
  #     PLUTO_USERNAME=your-pluto-email
  #     PLUTO_PASSWORD=your-pluto-password
  #
  # The compose file references ${PLUTO_USERNAME} / ${PLUTO_PASSWORD}
  # so the actual values are never written to disk in a tracked
  # file. The values DO show up in `docker inspect` on the host
  # (this is unavoidable with this image) — keep engine/.env
  # chmod 600 and limit who can SSH in.
  pluto-for-channels:
    image: jonmaddox/pluto-for-channels:latest
    container_name: tf-pluto-for-channels
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/pluto-for-channels:/config
    # Load .env at the file level so ${PLUTO_USERNAME} /
    # ${PLUTO_PASSWORD} below resolve. The .env file is gitignored
    # and chmod 600 — the values are never in the compose YAML.
    env_file:
      - .env
    environment:
      # Channels DVR emulation mode. The upstream image already
      # defaults to this when run standalone, but pinning it makes
      # the intent obvious.
      - MODE=docker
      # Inline via .env interpolation — see comment above.
      - PLUTO_USERNAME=${PLUTO_USERNAME}
      - PLUTO_PASSWORD=${PLUTO_PASSWORD}
