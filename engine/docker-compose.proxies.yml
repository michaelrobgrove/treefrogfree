# Tree Frog Streams — Optional proxy stack (Samsung + DistroTV + Cabernet)
#
# These containers are *not* required for the engine to work —
# they're a one-shot path to ~700 additional "free" channels sourced
# from Samsung TV Plus, DistroTV, and (via Cabernet) Xumo / Plex /
# Pluto / custom M3U/XMLTV feeds. They run alongside tf-engine and
# publish M3U+XMLTV endpoints that the engine imports the same way it
# imports any other playlist.
#
# Architecture:
#   ┌─────────────────┐   m3u+xmltv    ┌──────────┐    m3u+xmltv     ┌──────────────┐
#   │ samsung-tvplus  │ ─────────────▶ │          │ ────────────────▶│   Worker     │
#   │ distrotv-proxy  │                │ tf-engine│   KV catalog     │ free.tfplus. │
#   │ cabernet        │ ─────────────▶ │ 8000     │   KV playlist    │    stream    │
#   └─────────────────┘                └──────────┘                  └──────────────┘
#
# All three bind via `network_mode: host` because (a) they don't need
# isolation between each other and the engine, (b) M3U/EPG endpoints
# are friendlier to type as localhost:PORT than as docker-network IPs,
# and (c) the resource caps below make the host kernel the
# single place to police CPU/memory.
#
# Bring this up with:
#   cd /opt/treefrogfree
#   docker compose -f engine/docker-compose.yml        up -d        # engine
#   docker compose -f engine/docker-compose.proxies.yml up -d       # proxies
#
# See docs/proxy-stack.md for the per-proxy setup steps, auth
# requirements, and the import commands.
#
# ── Port allocation on the host (DO NOT change without reading this) ──
#
#   80        — Pluto for Channels' *preferred* port. (NOT in this
#               file; Pluto was dropped in favor of Cab's Pluto
#               plugin. See proxy-stack.md §3.)
#   3000      — **AIOstreams** (operator's most important service).
#               RESERVED. Do not bind anything here. Do not curl
#               127.0.0.1:3000 as a diagnostic for any proxy.
#   3001      — Samsung TV Plus (this file).
#   6077      — Cabernet (this file).
#   8000      — Tree Frog engine (docker-compose.yml).
#   8787      — DistroTV Proxy (this file).
#   50005     — SSH (already running on the host; never bind here).
#
# The matthuisman channels-dvr images (Samsung, the original
# Pluto-for-Channels) all default to port 80 — only one can hold
# that port at a time. Pluto is dropped in favor of Cab's Pluto
# plugin, so Samsung gets port 80 cleanly. But to keep the
# AIOstreams reservation crystal clear, we also pin Samsung to
# 3001 via the PORT env var (which the matthuisman image honors).

services:
  # ──────────────────────────────────────────────────────────────────
  # 1. DistroTV Proxy (ghcr.io/kineticman/distrotv-proxy)
  #    https://github.com/kineticman/DistroTV-Proxy
  # ──────────────────────────────────────────────────────────────────
  # Start with this one — it's the simplest (no auth, no DB, no
  # admin UI) and the easiest to verify. ~150 free channels from
  # DistroTV, served from a Python BaseHTTP listener.
  #
  # M3U path:  http://<host>:8787/playlist.m3u
  # XMLTV:     none (DistroTV doesn't publish a guide)
  #
  # The image only implements `GET`, so `curl -I` returns 501. Use
  # `curl -s` (GET) instead when verifying. See proxy-stack.md §1.
  distrotv-proxy:
    image: ghcr.io/kineticman/distrotv-proxy:latest
    container_name: tf-distrotv-proxy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/distrotv-proxy:/config
    cpus: 0.10                # tiny — pure pass-through
    mem_limit: 128m
    mem_reservation: 64m
    pids_limit: 100

  # ──────────────────────────────────────────────────────────────────
  # 2. Samsung TV Plus for Channels (matthuisman/samsung-tvplus-for-channels)
  #    https://github.com/matthuisman/samsung-tvplus-for-channels
  # ──────────────────────────────────────────────────────────────────
  # ~400 ad-supported "Samsung TV Plus" channels. Channels DVR–compat
  # backend, so the URL shape is `/tuner-N-playlist.m3u` + `/epg.xml`.
  #
  # The matthuisman image defaults to port 80. We pin it to 3001
  # via the PORT env var to:
  #   1. keep AIOstreams (port 3000) untouched
  #   2. avoid collision with the (now-dropped) Pluto container
  #   3. leave room for any future matthuisman image at port 80
  #
  # M3U path:  http://<host>:3001/tuner-1-playlist.m3u
  # XMLTV:     http://<host>:3001/epg.xml
  samsung-tvplus:
    image: matthuisman/samsung-tvplus-for-channels:latest
    container_name: tf-samsung-tvplus
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/samsung-tvplus:/config
    cpus: 0.25
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 100
    environment:
      # Pin to 3001 — see comment block at top of file.
      - PORT=3001

  # ──────────────────────────────────────────────────────────────────
  # 3. Cabernet (ghcr.io/cabernetwork/cabernet)
  #    https://github.com/cabernetwork/cabernet
  # ──────────────────────────────────────────────────────────────────
  # The "all-in-one master". Plugin-based bridge that turns free
  # linear-stream sources (Pluto, Xumo, Plex, Stirr, Local Now, …)
  # plus custom M3U/XMLTV feeds into a single Channels DVR–
  # compatible HTTP endpoint. The reason to add it on top of the
  # per-source proxies is the **plugin ecosystem**: it normalizes
  # 30+ sources and dedupes by channel name + region.
  #
  # **Cab subsumes Pluto** — Cab's "Pluto" plugin (under
  # Settings → Plugins) pulls from the same Pluto API the
  # standalone `jonmaddox/pluto-for-channels` container would,
  # but the source-cred lifecycle is handled in one place and
  # dedup happens across all enabled plugins. We don't run the
  # standalone Pluto container in this stack to avoid the
  # double-pull.
  #
  # Cab's admin UI at http://<host>:6077/ must be opened in a
  # browser once on first boot to set the admin password and pick
  # which plugins to enable. Until that's done, /m3u/channels.m3u
  # returns an 8-byte stub. See proxy-stack.md §4.
  #
  # Cab needs more memory than the other two — the plugin
  # loaders cache EPG XMLTV and channel lists in process.
  cabernet:
    image: ghcr.io/cabernetwork/cabernet:latest
    container_name: tf-cabernet
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data/cabernet:/config
    cpus: 0.5
    mem_limit: 768m
    mem_reservation: 256m
    pids_limit: 200
    environment:
      # Cab's "instance name" appears in the M3U headers and shows
      # up in the admin UI. Pick a stable string here so imports
      # identify the source reliably.
      - CAB_INSTANCE_NAME=TreeFrog
