# Hard resource caps so the engine coexists with AIOstreams on the same host.
# See plan.md §12.1 for the reasoning.
services:
  tf-engine:
    build: .
    image: treefrog-engine:dev
    container_name: treefrog-engine
    restart: unless-stopped
    cpus: 0.5                 # hard cap, AIOstreams must not be starved
    mem_limit: 1g             # hard cap
    mem_reservation: 512m     # guaranteed floor
    pids_limit: 200           # fork-bomb guard
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # Mount the host's secrets dir as a read-only filesystem inside
      # the container. Combined with CF_*_FILE env vars in .env, this
      # gives you a complete *_FILE → file path chain:
      #   .env:  CF_API_TOKEN_FILE=/secrets/cf.token
      #   host:  /root/.secrets/cf.token  (chmod 600)
      #   engine reads /secrets/cf.token → real token value
      - /root/.secrets:/secrets:ro
      # Mount the admin UI's static assets (../edge/public/admin) into
      # the container so the engine can serve the dashboard at
      # http://<engine>:8000/admin/. Same-origin = no mixed content,
      # no CORS, no proxy. Path inside the container is fixed:
      # /app/admin_static. See engine/admin/server.py::handle_admin_ui.
      - ../edge/public/admin:/app/admin_static:ro
    # Host networking: aiohttp binds directly to the host's
    # ADMIN_HOST:ADMIN_PORT (default 0.0.0.0:8000). Avoids the
    # docker-proxy userland forwarder (which was RST'ing host-to-
    # container connections on this kernel). Bind 0.0.0.0 is safe
    # ONLY because UFW restricts port 8000 to the Tailscale subnet
    # 100.64.0.0/10. See docs/vps-deploy.md §2.3 for the
    # `ufw allow from 100.64.0.0/10 to any port 8000` rule.
    network_mode: host
