# Hard resource caps so the engine coexists with AIOstreams on the same host.
# See plan.md §12.1 for the reasoning.
services:
  tf-engine:
    build: .
    image: treefrog-engine:dev
    container_name: treefrog-engine
    restart: unless-stopped
    cpus: 0.5                 # hard cap, AIOstreams must not be starved
    mem_limit: 1g             # hard cap
    mem_reservation: 512m     # guaranteed floor
    pids_limit: 200           # fork-bomb guard
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # Mount the host's secrets dir as a read-only filesystem inside
      # the container. Combined with CF_*_FILE env vars in .env, this
      # gives you a complete *_FILE → file path chain:
      #   .env:  CF_API_TOKEN_FILE=/secrets/cf.token
      #   host:  /root/.secrets/cf.token  (chmod 600)
      #   engine reads /secrets/cf.token → real token value
      - /root/.secrets:/secrets:ro
    # Host networking: aiohttp binds directly to 127.0.0.1:8000 on the
    # VPS host. Avoids the docker-proxy userland forwarder (which was
    # RST'ing host-to-container connections on this kernel). Still
    # safe — aiohttp is hard-coded to ADMIN_HOST=127.0.0.1, so it
    # never listens on 0.0.0.0 or any external interface. Tailscale
    # devices reach it via the host's Tailscale IP as before.
    network_mode: host
