# Tree Frog Plus — Pages project config.
#
# This file is used by `wrangler pages deploy` to find the
# project's KV bindings and vars. The Pages project name is
# `treefrogplus`; its production branch is currently `production`
# and will be flipped to `beta` when we're ready to ship.

name = "treefrogplus"

# Pages reads the static assets from the current directory
# (the same one we run `wrangler pages deploy .` against).
pages_build_output_dir = "."

# KV namespace for account + session storage. The `id` is the
# production namespace; `wrangler pages dev` auto-creates and
# binds the *_preview namespace.
[[kv_namespaces]]
binding = "PLUS_KV"
id = "a0a2c68a61f54a26b18a93f900298118"
preview_id = "8753343e8e2244e6a7d5a07b7f918dbc"

# Non-secret vars. Set in the Cloudflare dashboard for
# `treefrogplus` under Settings → Environment variables, or in
# this file under [vars]. Defaults below match the beta env.
#
# [vars]
# PAYPAL_API_BASE     = "https://api-m.sandbox.paypal.com"
# PUBLIC_BASE_URL     = "https://beta.tfplus.stream"
# DNS_PRIMARY         = "https://apex.tfplus.stream"
# DNS_SECONDARY       = "http://comet.tfplus.stream"
# BOUQUET_US_WO       = "66496"   # ← fill from action=bouquet
# BOUQUET_US_W        = "67000"
# BOUQUET_CA_WO       = "67006"
# BOUQUET_CA_W        = "67007"
# RESEND_FROM_ADDRESS = "Tree Frog Plus <noreply@tfplus.stream>"
#
# We use PayPal Orders (one-time payments) for billing, not
# PayPal Subscriptions — the site generates a fresh payment
# link on every renewal. So there are no `PAYPAL_PLAN_*` env
# vars. The price for any plan is hard-coded in
# `functions/_lib/plans.ts` and reused by both the checkout
# and the renewal flow.

# Secrets — set via `wrangler pages secret put NAME` (NEVER commit):
#   PAYPAL_CLIENT_ID
#   PAYPAL_CLIENT_SECRET
#   PAYPAL_WEBHOOK_ID
#   GOLDPANEL_API_KEY
#   RESEND_API_KEY
